. Alternate kicking legs up and down in small, rapid motions. Keep lower back pressed into the floor. Each kick equals 1 rep."},leg_raises:{name:"Floor Leg Raises",target:"Abs",reps:15,cal:8,icon:"\u{1F4D0}",desc:"Lie flat, arms at sides palms down. Keeping legs straight and together, raise them to 90 degrees then lower slowly. Stop 2 inches from the floor. Do not let your lower back arch. Destroys the lower abs."},mountain_climbers:{name:"Mountain Climbers",target:"Abs",reps:30,cal:14,icon:"\u{1F3D4}\uFE0F",desc:"High plank position, hands directly under shoulders. Drive one knee toward your chest, then explosively switch legs. Maintain a flat back and tight core. Each leg drive equals 1 rep. Speed is the weapon here."},russian_twists:{name:"Russian Twists",target:"Abs",reps:30,cal:9,icon:"\u{1F300}",desc:"Sit with knees bent, feet off the ground, torso leaned back 45 degrees. Clasp hands together. Rotate your torso to touch the ground on each side. Each side equals 1 rep. For intensity, straighten your legs."},plank_hold:{name:"Military Plank Hold",target:"Abs",reps:60,cal:6,icon:"\u{1F9F1}",desc:"Forearm plank: elbows under shoulders, body in a rigid line from head to heels. Squeeze glutes, brace core as if about to take a punch. Hold for 60 seconds. No sagging, no piking. Reps equal seconds."},v_ups:{name:"V-Ups",target:"Abs",reps:15,cal:10,icon:"\u270C\uFE0F",desc:"Lie flat, arms overhead. Simultaneously lift legs and torso, reaching hands to touch your toes at the top forming a V shape. Lower back down with control. Full range of motion is non-negotiable."},glute_bridges:{name:"Glute Bridges",target:"Butt",reps:25,cal:8,icon:"\u{1F309}",desc:"Lie on your back, feet flat, knees bent. Drive through your heels to lift hips until your body forms a straight line from shoulders to knees. Squeeze glutes hard at top for 2 seconds. Lower slowly."},donkey_kicks:{name:"Donkey Kicks",target:"Butt",reps:20,cal:7,icon:"\u{1FACF}",desc:"On all fours, hands under shoulders, knees under hips. Keeping knee bent at 90 degrees, drive one foot toward the ceiling until thigh is parallel with the floor. Squeeze glute at top. 20 reps each side."},fire_hydrants:{name:"Fire Hydrants",target:"Butt",reps:20,cal:7,icon:"\u{1F692}",desc:"On all fours, lift one knee out to the side, keeping it bent at 90 degrees, until thigh is parallel to the floor. Hold 1 second. Lower with control. 20 reps each side. Targets the gluteus medius."},single_leg_bridge:{name:"Single-Leg Glute Bridge",target:"Butt",reps:15,cal:9,icon:"\u{1F9A9}",desc:"Standard bridge position but extend one leg straight toward the ceiling. Drive through the planted heel, lifting hips high. Squeeze glute at top. 15 reps each leg. Brutal unilateral work."},sumo_pulse:{name:"Sumo Squat Pulses",target:"Butt",reps:25,cal:11,icon:"\u{1F3CB}\uFE0F",desc:"Wide stance, toes pointed out 45 degrees. Squat deep until thighs are parallel. Hold at the bottom and pulse with small 3-inch up-and-down movements. 25 pulses. The burn is the point."},curtsy_lunges:{name:"Curtsy Lunges",target:"Butt",reps:20,cal:10,icon:"\u{1F451}",desc:"Standing tall, step one foot behind and across your body as if curtsying. Lower until front thigh is parallel to the floor. Drive through the front heel to return. Alternate legs, 10 each side."},jump_squats:{name:"Jump Squats",target:"Legs",reps:15,cal:14,icon:"\u{1F680}",desc:"Feet shoulder-width, squat until thighs are parallel. Explode upward, leaving the ground. Land softly with bent knees and immediately descend into the next squat. Power and control in equal measure."},lunges:{name:"Walking Lunges",target:"Legs",reps:20,cal:12,icon:"\u{1F6B6}",desc:"Step forward into a deep lunge with both knees at 90 degrees, back knee hovering 1 inch off the ground. Drive through the front heel and step the back foot forward into the next lunge. 10 each leg."},wall_sit:{name:"Wall Sit",target:"Legs",reps:45,cal:6,icon:"\u{1F9F1}",desc:"Back flat against a wall, slide down until thigh
